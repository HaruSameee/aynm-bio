    body {
      background: var(--bg-deep);
      min-height: 100vh;

    /* ── page transition overlay ── */
    #transition {
      position: fixed; inset: 0;
      background: #1a2e3c;
      z-index: 9999;
      pointer-events: none;
      opacity: 1;
      transition: opacity .6s ease;
    }
    #transition.done { opacity: 0; }

    /* ── custom cursor ── */
    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(180,225,240,0.9);
      pointer-events: none;
      z-index: 9000;
      transform: translate(-50%,-50%);
      transition: transform .08s ease, opacity .2s;
      box-shadow: 0 0 8px rgba(160,210,230,0.7), 0 0 20px rgba(160,210,230,0.3);
    }
    #cursor-ring {
      position: fixed;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(160,210,230,0.45);
      pointer-events: none;
      z-index: 8999;
      transform: translate(-50%,-50%);
      transition: transform .18s ease, width .2s, height .2s, opacity .2s;
    }
    body:has(a:hover) #cursor-ring,
    body:has(button:hover) #cursor-ring {
      width: 38px; height: 38px;
      border-color: rgba(160,210,230,0.7);
    }

    /* ── particle canvas ── */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

      background-position: 40% 30%;
      z-index: 0;
    }
    .photo-bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 65% 110% at 0% 50%,
          var(--bg-deep) 0%,
          rgba(46,80,104,0.92) 30%,
          rgba(46,80,104,0.65) 52%,
          rgba(46,80,104,0.22) 70%,
          transparent 100%
        );
    }
    .photo-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(46,80,104,0.30) 0%, transparent 20%,
        transparent 65%, rgba(20,36,52,0.55) 100%
      );
    }

    /* ── clouds ── */
    .clouds { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .cloud {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: drift linear infinite;
      background: rgba(210,232,240,0.1); filter: blur(24px);
    }
    @keyframes drift {
      0%   { transform: translateX(-120%) translateY(0); opacity: 0; }
      6%   { opacity: var(--op); }
      88%  { opacity: var(--op); }
      100% { transform: translateX(115vw) translateY(var(--dy,0px)); opacity: 0; }
    }
    .c1{width:420px;height:100px;top:10%;--op:.2;animation-duration:70s;animation-delay:-8s}
    .c2{width:580px;height:120px;top:18%;--op:.14;animation-duration:95s;animation-delay:-30s;--dy:20px}
    .c3{width:290px;height:70px;top:5%;--op:.16;animation-duration:80s;animation-delay:-50s;--dy:-15px}
    .c4{width:480px;height:110px;top:28%;--op:.10;animation-duration:115s;animation-delay:-15s;--dy:10px}
    .c5{width:350px;height:85px;top:12%;--op:.12;animation-duration:88s;animation-delay:-42s}

    /* ── rays ── */
    .rays {
      position: fixed; top: -5vh; right: 0;
      width: 80vw; height: 90vh;
      background: conic-gradient(from -15deg at 80% 0%,
        transparent 0deg, rgba(160,210,230,0.03) 4deg, transparent 8deg,
        transparent 20deg, rgba(160,210,230,0.02) 24deg, transparent 28deg,
        transparent 40deg, rgba(160,210,230,0.035) 44deg, transparent 48deg
      );
      pointer-events: none; z-index: 2;
      animation: rayShift 14s ease-in-out infinite alternate;
      transform-origin: 80% 0%;
    }
    @keyframes rayShift {
      from { opacity:.5; transform:rotate(-2deg); }
      to   { opacity:.9; transform:rotate(2deg); }
    }

    /* ── layout ── */
    .layout {
      position: relative; z-index: 3;
      display: flex; flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .left-col {
      width: clamp(280px, 22vw, 420px); flex-shrink: 0;
      display: flex; flex-direction: column;
      justify-content: center;
      padding: clamp(32px, 4vh, 56px) clamp(20px, 2.5vw, 40px) clamp(24px, 3vh, 40px) clamp(28px, 3.5vw, 52px);
    }
    .right-col { flex: 1; }

    /* ── name block ── */
    .name-block { margin-bottom: 26px; animation: fadeIn .8s ease both .1s; }
    .name-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .avatar-wrap { position: relative; width: 54px; height: 54px; flex-shrink: 0; }
    .avatar-wrap img {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
      border: 1.5px solid rgba(160,210,220,0.38);
      box-shadow: 0 4px 18px rgba(0,0,0,0.38);
    }
    .status-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 11px; height: 11px; border-radius: 50%;
      background: #747f8d; border: 2px solid var(--bg-deep);
    }
    .status-dot.online  { background: #43b581; }
    .status-dot.idle    { background: #faa61a; }
    .status-dot.dnd     { background: #f04747; }

    .name {
      font-family: 'Klee One', cursive;
      font-style: normal; font-size: 2.3rem; font-weight: 600;
      letter-spacing: .18em; color: rgba(224,244,252,0.88);
      text-shadow: 0 1px 12px rgba(120,190,220,0.25), 0 0 30px rgba(120,190,220,0.10);
      line-height: 1;
    }
    .tagline {
      margin-top: 4px; font-size: clamp(0.62rem, 0.75vw, 0.82rem);
      letter-spacing: .32em; text-transform: uppercase; color: var(--text-muted);
    }
    .stack { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .stack-tag {
      font-size: .66rem; letter-spacing: .1em;
      padding: 2px 10px; border-radius: 20px;
      background: rgba(60,140,165,0.2);
      border: 1px solid rgba(100,175,190,0.26);
      color: var(--text-soft);
      display: inline-flex; align-items: center; gap: 5px;
    }

    .rule {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, rgba(120,185,200,0.3), transparent);
      margin: 20px 0; animation: fadeIn .8s ease both .2s;
    }

      border-color: rgba(100,175,190,0.22);

      border-color: rgba(100,175,190,0.2);

    .menu-arrow {
      margin-left: auto; font-size: .72rem; color: var(--text-muted);
      transition: transform .25s; display: inline-block;
    }

    .section-content {
      overflow: hidden; max-height: 0;
      transition: max-height .35s ease; padding: 0 12px;
    }
    .section-content.open { max-height: 420px; }
    .section-content-inner {
      padding: 10px 0 12px;
      border-top: 1px solid rgba(100,175,190,0.13); margin-top: 2px;
    }

      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .blog-banner {
      display: block;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(100,175,190,0.25);
      transition: border-color .2s, box-shadow .2s, transform .2s;
      position: relative;
    }
    .blog-banner:hover {
      border-color: rgba(140,210,230,0.55);
      box-shadow: 0 4px 20px rgba(80,160,200,0.2);
      transform: translateY(-2px);
    }
    .blog-banner img {
      width: 100%;
      height: auto;
      display: block;
    }
    .blog-banner::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 60%, rgba(46,80,104,0.35) 100%);
      transition: opacity .2s;
    }
    .blog-banner:hover::after { opacity: 0; }

    .view {
      position: fixed; inset: 0;
      z-index: 5;
      opacity: 0;
      pointer-events: none;

    .view.active {
      opacity: 1;
      pointer-events: all;

      align-items: center;
      gap: 16px;

      border-radius: 8px; padding: 7px 14px;
      color: var(--text-muted); font-family: inherit;
      font-size: .75rem; letter-spacing: .14em;
      cursor: none;
      transition: border-color .2s, color .2s;

    .blog-back-btn:hover {
      border-color: rgba(160,220,235,0.65);
      color: var(--text);
    }

      font-family: 'Klee One', cursive;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      font-weight: 600;
      letter-spacing: .12em;
      color: rgba(224,244,252,0.88);
      text-shadow: 0 1px 12px rgba(120,190,220,0.25);
    }
    .blog-grid {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .blog-card {
      display: block;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(100,175,190,0.25);
      transition: border-color .2s, box-shadow .2s, transform .2s;
      position: relative;
    }
    .blog-card:hover {
      border-color: rgba(140,210,230,0.6);
      box-shadow: 0 6px 28px rgba(80,160,200,0.22);
      transform: translateY(-3px);
    }
    .blog-card img {
      width: 100%; height: auto; display: block;
    }
    .blog-card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 55%, rgba(46,80,104,0.4) 100%);
      transition: opacity .2s;
    }
    .blog-card:hover::after { opacity: 0; }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

  </div><!-- /view-blog -->

  <script>

    // ── view switcher ──
    function switchView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + id).classList.add('active');
    }

    // ── page transition in ──
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('transition').classList.add('done'), 80);
    });

    // ── transition out on nav ──
    document.querySelectorAll('a[href]:not([target="_blank"]):not([href="#"])').forEach(a => {
      a.addEventListener('click', e => {
        const href = a.getAttribute('href');
        if (!href || href === '#') return;
        e.preventDefault();
        const t = document.getElementById('transition');
        t.style.transition = 'opacity .4s ease';
        t.style.opacity = '1';
        setTimeout(() => { location.href = href; }, 420);
      });
    });

    // ── cursor ──
    const cur = document.getElementById('cursor');
    let mx = 0, my = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function animCursor() {
      cur.style.left = mx + 'px';
      cur.style.top  = my + 'px';
      requestAnimationFrame(animCursor);
    })();

    // ── particles ──
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function rand(a, b) { return a + Math.random() * (b - a); }

      function spawn() {
        return {
          x: rand(0, W), y: rand(0, H),
          r: rand(0.5, 1.4),
          vx: rand(-0.15, 0.15),
          vy: rand(-0.35, -0.08),
          alpha: rand(0.1, 0.35),
          fade: rand(0.0008, 0.002),
          life: 1,
        };
      }

      for (let i = 0; i < 28; i++) particles.push(spawn());

      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach((p, i) => {
          p.x += p.vx; p.y += p.vy; p.life -= p.fade;
          if (p.life <= 0) { particles[i] = spawn(); return; }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(190,228,242,${p.alpha * p.life})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ── accordion ──
    const openSections = { activity: true };
    function toggle(id) {
      openSections[id] = !openSections[id];
      document.getElementById('content-' + id).classList.toggle('open', openSections[id]);
      document.getElementById('btn-' + id).classList.toggle('open', openSections[id]);
      document.getElementById('arrow-' + id).style.transform = openSections[id] ? 'rotate(90deg)' : 'none';
    }

    // ── Lanyard ──
    const DISCORD_ID = '452496068064837642';
    const statusDot  = document.getElementById('status-dot');
    const avatarEl   = document.getElementById('avatar');
    const activityInner = document.getElementById('activity-inner');

    function setStatus(s) { statusDot.className = 'status-dot ' + (s || 'offline'); }

    function renderActivity(data) {
      if (data.discord_user?.avatar)
        avatarEl.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${data.discord_user.avatar}.webp?size=128`;
      setStatus(data.discord_status);

      if (data.listening_to_spotify && data.spotify) {
        const sp = data.spotify;
        activityInner.innerHTML = `
          <div class="spotify-card">
            <img class="spotify-art" src="${sp.album_art_url}" alt="">
            <div>
              <div class="spotify-label">▶ Spotify</div>
              <div class="spotify-song">${sp.song}</div>
              <div class="spotify-artist">${sp.artist.replace(/;/g,', ')}</div>
            </div>
          </div>`;
        return;
      }

      const acts = (data.activities || []).filter(a => a.type !== 4);
      if (acts.length) {
        const a = acts[0];
        const label = ['Playing','Streaming','Listening to','Watching','','Competing in'][a.type] ?? 'Active';
        const icon = a.application_id && a.assets?.large_image
          ? `https://cdn.discordapp.com/app-assets/${a.application_id}/${a.assets.large_image}.webp?size=64`
          : null;
        activityInner.innerHTML = `
          <div class="activity-card">
            ${icon ? `<img class="activity-icon" src="${icon}" alt="">` : ''}
            <div>
              <div class="activity-type">${label}</div>
              <div class="activity-name">${a.name}</div>
              ${a.details ? `<div class="activity-detail">${a.details}</div>` : ''}
              ${a.state   ? `<div class="activity-detail">${a.state}</div>`   : ''}
            </div>
          </div>`;
        return;
      }
      activityInner.innerHTML = '<div class="activity-none">Nothing right now</div>';
    }

    let ws, hb;
    function connect() {
      ws = new WebSocket('wss://api.lanyard.rest/socket');
      ws.onmessage = e => {
        const m = JSON.parse(e.data);
        if (m.op === 1) {
          ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_ID } }));
          hb = setInterval(() => ws.send(JSON.stringify({ op: 3 })), m.d.heartbeat_interval);
        }
        if (m.op === 0 && (m.t === 'INIT_STATE' || m.t === 'PRESENCE_UPDATE'))
          renderActivity(m.d);
      };
      ws.onclose = () => { clearInterval(hb); setTimeout(connect, 3000); };
      ws.onerror = () => ws.close();
    }
    connect();
  </script>
